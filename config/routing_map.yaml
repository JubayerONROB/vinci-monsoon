# =============================================================================
# Routing configuration for the two-stage hybrid router.
# Everything here is a POLICY KNOB — edit freely, no code changes needed.
# =============================================================================

# --- Category -> role -------------------------------------------------------
# Each of the 8 capability categories maps to an abstract ROLE. Roles are
# resolved to a concrete Fireworks model ID at runtime by matching substrings
# against the ALLOWED_MODELS env var (see role_model_hints below).
category_roles:
  factual_knowledge: general
  math_reasoning: reasoning
  sentiment: general
  summarization: general
  ner: general
  code_debugging: code
  # A/B verdict: minimax-low EMPTIES on hard puzzles, forcing a second
  # (kimi) call per task — deadly on a slow-network grading box. Logic rides
  # the CODE role (kimi answers correctly in ONE call).
  logical_reasoning: code
  code_generation: code

# --- Role -> model substring hints ------------------------------------------
# HINTS, NOT GUARANTEES. Matched case-insensitively, in order, against the
# model IDs actually present in ALLOWED_MODELS at runtime. First hint that
# matches an allowed model wins. If nothing matches, the resolver degrades
# gracefully to the FIRST entry of ALLOWED_MODELS — we never invent an ID.
# Set for the published Track 1 list: minimax-m3, kimi-k2p7-code,
# gemma-4-31b-it, gemma-4-26b-a4b-it, gemma-4-31b-it-nvfp4.
# Gemma variants are deliberately NOT hinted (on-demand, ~$7/hr idle).
# Short substrings ("kimi", "minimax") so a platform-side ID rev (e.g. a
# version suffix) still resolves; never full-ID-hardcoded.
role_model_hints:
  reasoning: ["minimax-m3", "minimax"]   # math_reasoning
  code: ["kimi-k2p7-code", "kimi"]       # code_debugging, code_generation, logic
  # REVERTED from kimi: the kimi re-laning graded 84.2% (16/19) vs 94.7%
  # on minimax — prime suspect for the -2 tasks. sentiment/ner/summarization
  # now go LOCAL first (zero tokens, verifier-gated) and only their
  # escalations plus factual land here, so the minimax prompt-overhead
  # premium buys accuracy where it matters.
  general: ["minimax-m3", "minimax"]     # factual + local-lane escalations

# --- Escalation policy per category -----------------------------------------
# VESTIGIAL in all-remote mode: the GGUF was removed, so the router's
# force_all_remote path always fires and every task escalates regardless of
# this section. Kept for documentation and as the policy if a local model
# ever returns. Values:
#   strict  -> local only if difficulty == shallow AND confidence == high
#   lenient -> local whenever difficulty == shallow (low confidence tolerated)
#   always  -> always escalate to Fireworks, never answer locally
# Small local models are weak at multi-step math / logic / code, so those
# four categories are FORCE-REMOTE ("always"): they escalate to Fireworks
# unconditionally, ignoring the local classifier's difficulty/confidence.
# Cheap classification-style categories stay local-first ("lenient").
escalation_policy:
  default: strict
  overrides:
    math_reasoning: always      # force_remote
    logical_reasoning: always   # force_remote
    code_debugging: always      # force_remote
    code_generation: always     # force_remote
    # Gate insurance: factual is the largest category AND the classifier's
    # misroute default — a weak local 3B answer here is the biggest accuracy
    # leak. general role -> minimax-m3 (serverless, reasoning disabled).
    factual_knowledge: always
    sentiment: lenient
    summarization: lenient
    # Measured leak (judging round): local 3B drops DATE/ORG entities and
    # emits junk on dense NER -> force remote via general role (minimax-m3).
    ner: always

# --- Generation limits -------------------------------------------------------
limits:
  classify_max_tokens: 64      # stage-1 JSON is tiny; keep latency low
  local_max_tokens: 180        # local answers cost 0 tokens but MUST be fast:
                               # the 2-vCPU grading box generates ~2-4x slower
                               # than CI, and 300 tokens there risks the 30s cap
  # Output caps calibrated from run #39 token measurements (biggest observed
  # completion per lane + ~60% headroom). Tokens are the RANKING metric.
  remote_max_tokens: 300       # general lane: worst observed 98ct (factual)
  remote_max_tokens_by_role:
    reasoning: 600   # math at effort=low peaks at ~520ct (hard-math-01, run #39)
    code: 500        # role-level ceiling for the code lane
  # Per-CATEGORY caps override role caps: calibrated from run #55 peaks with
  # ~2.5-4x headroom so they only stop pathological blowups, never a real
  # answer. Math is deliberately ABSENT (accuracy-critical, keeps 600).
  remote_max_tokens_by_category:
    code_debugging: 250      # peak observed 55ct (code-only style)
    code_generation: 350     # peak observed 130ct
    logical_reasoning: 450   # peak observed 297ct (brief-steps style)
  # Successful Fireworks calls return in 1-3s (per DIAG); this cap exists
  # only to cut off HUNG calls fast on a slow-network grading box. The
  # run-level guard is the GLOBAL 500s deadline in entrypoint.py.
  remote_timeout_seconds: 12   # per-request; hung call cut off in 12s
  classify_prompt_chars: 1500  # truncate very long prompts for stage-1 only

# --- Escalation aggressiveness ------------------------------------------------
thresholds:
  # reasoning_effort for minimax on the REASONING role (math). A/B VERDICT:
  # "none" got hard-math-02 WRONG (skipped the drain in phase 1, run #41);
  # "low" solved every math mock (run #39) and the graded set. Correctness
  # gates ranking — keep "low".
  reasoning_role_effort: "low"
  # Categorical classifier confidence maps to a score (high=0.95, low=0.50);
  # it must EXCEED this to stay local. 0.90 means only confident-high stays.
  local_confidence_threshold: 0.90
  # Escalate any prompt containing code syntax, math, or step-by-step cues,
  # even when the classifier calls it easy.
  aggressive_escalation: true
