name: build

on:
  push:
    branches: [main]
  # Manual trigger for the live Fireworks integration test (integration-test
  # job below). NOTE: the defaults are PLACEHOLDERS for plumbing validation
  # only — the REAL FIREWORKS_BASE_URL / ALLOWED_MODELS are injected by the
  # grading harness at evaluation time. On launch day, paste the published
  # values here when dispatching AND update role_model_hints in
  # config/routing_map.yaml.
  workflow_dispatch:
    inputs:
      fireworks_base_url:
        description: "Fireworks base URL (PLACEHOLDER default: public API)"
        type: string
        required: false
        default: "https://api.fireworks.ai/inference/v1"
      allowed_models:
        description: "Comma-separated model IDs (PLACEHOLDER default)"
        type: string
        required: false
        default: "accounts/fireworks/models/llama-v3p1-8b-instruct"

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Gate publishing on the offline suite. We install only the light deps:
      # llama-cpp-python needs a long native compile and the offline tests are
      # designed to run on the heuristic backend without it.
      - name: Offline tests
        run: |
          pip install requests PyYAML pytest
          python tests/run_eval.py
          pytest tests/test_schema.py tests/test_verifiers.py \
                 tests/test_output_integrity.py tests/test_model_resolution.py -q

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short commit SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # GHCR requires a lowercase repository path.
      # Two tags per build: :latest is the moving submission pointer, and
      # :<short-sha> (7 chars) is an immutable version so every graded image
      # remains pullable and traceable to its exact commit.
      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/jubayeronrob/vinci-monsoon:latest
            ghcr.io/jubayeronrob/vinci-monsoon:${{ steps.sha.outputs.short }}

      # Run the freshly pushed image exactly like the grading harness:
      # tasks mounted at /input, results expected at /output/results.json.
      # No Fireworks env vars are set, so the agent must degrade gracefully
      # to local-only answers (the valid ZERO_API_CALLS path).
      - name: Smoke-run image against mock tasks
        run: |
          mkdir -p "$PWD/out"
          docker run --rm \
            -v "$PWD/tests/mock_tasks.json:/input/tasks.json:ro" \
            -v "$PWD/out:/output" \
            ghcr.io/jubayeronrob/vinci-monsoon:latest

      - name: Validate results schema
        run: |
          python - <<'EOF'
          import json, sys
          with open("out/results.json", encoding="utf-8") as fh:
              results = json.load(fh)
          assert isinstance(results, list) and results, "results.json must be a non-empty array"
          for e in results:
              assert set(e) == {"task_id", "answer"}, f"bad keys: {e.keys()}"
              assert isinstance(e["task_id"], str) and e["task_id"]
              assert isinstance(e["answer"], str) and e["answer"].strip(), f"empty answer: {e['task_id']}"
          print(f"OK: {len(results)} valid results")
          EOF

      - name: Report compressed image size
        run: |
          IMG=ghcr.io/jubayeronrob/vinci-monsoon:latest
          RAW=$(docker buildx imagetools inspect --raw "$IMG")
          # buildx pushes an OCI image index; drill into the linux/amd64
          # manifest to sum its layer sizes. Handle a bare manifest too.
          if echo "$RAW" | jq -e '.layers' >/dev/null; then
            SIZE_BYTES=$(echo "$RAW" | jq '[.layers[].size] | add')
          else
            DIGEST=$(echo "$RAW" | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' | head -1)
            SIZE_BYTES=$(docker buildx imagetools inspect --raw "$IMG@$DIGEST" | jq '[.layers[].size] | add')
          fi
          echo "Compressed image size: $(numfmt --to=iec "$SIZE_BYTES") ($SIZE_BYTES bytes)"
          echo "Hackathon cap: 10GB compressed"
          # HARD GATE: big images are the prime suspect for the graded 0/19
          # (4.9 GB hybrid scored 0 twice; 50 MB never did). :latest is
          # already pushed at this point, but a red build means the image is
          # NOT resubmittable and the anchor stays the submission.
          LIMIT=2684354560
          if [ "$SIZE_BYTES" -gt "$LIMIT" ]; then
            echo "::error::Image ${SIZE_BYTES}B exceeds the 2.5GB slim gate — NOT resubmittable"
            exit 1
          fi
          echo "Slim gate OK (<= 2.5GB)"

  # ==========================================================================
  # MANUAL live Fireworks integration test — runs ONLY via workflow_dispatch
  # ("Run workflow" button), never on push, because it spends real tokens.
  # It validates PLUMBING (auth, base URL routing, graceful fallback), NOT the
  # real routing map: the default ALLOWED_MODELS input is a PLACEHOLDER.
  # The API key is referenced only as a secret and passed to the container BY
  # NAME (-e FIREWORKS_API_KEY) so its value never appears in logs.
  # ==========================================================================
  integration-test:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      FIREWORKS_BASE_URL: ${{ inputs.fireworks_base_url }}
      ALLOWED_MODELS: ${{ inputs.allowed_models }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image (no rebuild)
        run: docker pull ghcr.io/jubayeronrob/vinci-monsoon:latest

      - name: Run container with live env (vars passed BY NAME)
        run: |
          mkdir -p "$PWD/out"
          docker run --rm \
            -e FIREWORKS_API_KEY -e FIREWORKS_BASE_URL -e ALLOWED_MODELS \
            -v "$PWD/tests/mock_tasks.json:/input/tasks.json:ro" \
            -v "$PWD/out:/output" \
            ghcr.io/jubayeronrob/vinci-monsoon:latest

      - name: Validate container results schema
        run: |
          python - <<'EOF'
          import json
          with open("out/results.json", encoding="utf-8") as fh:
              results = json.load(fh)
          assert isinstance(results, list) and results, "results.json must be a non-empty array"
          for e in results:
              assert set(e) == {"task_id", "answer"}, f"bad keys: {sorted(e)}"
              assert isinstance(e["task_id"], str) and e["task_id"]
              assert isinstance(e["answer"], str) and e["answer"].strip(), f"empty answer: {e['task_id']}"
          print(f"OK: {len(results)} valid results")
          EOF

      - name: Show per-task diagnostics (diag.json)
        run: python -m json.tool out/diag.json

      - name: Show full answers (results_full.json)
        run: python -m json.tool out/results_full.json

      # Non-sensitive summary only: counts and booleans, never env values.
      # real_fireworks_success=true means a genuine completion came back;
      # false + fallback>0 with placeholder models usually means an expected
      # 404 -> clean local fallback (still a plumbing PASS).
      - name: Live eval harness (EVAL_LIVE=1)
        run: |
          pip install requests PyYAML
          EVAL_LIVE=1 python tests/run_eval.py

      # ======================================================================
      # GRADING-CONDITIONS SANDBOX: 2 vCPU / 4 GB (the grading box), a
      # tasks.json with UNSEEN judge-style ids, local lane FORCED ON. The
      # checker reads the RAW results.json (the judge's view) and fails on
      # id drift, misalignment, wrapper contamination, blank/fallback
      # leakage, and objective correctness probes — no LLM self-judging.
      # (The main run above uses the image default LOCAL_CATEGORIES="" and
      # therefore validates the pure-remote candidate.)
      # ======================================================================
      - name: Sandbox (2cpu/4g NO SWAP, 19 unseen ids, lane ON) — raw judge view
        run: |
          mkdir -p sbout
          # --memory-swap == -m disables swap: CI runners have swap but the
          # grading box likely does not, and swap absence is a prime
          # difference that could hide OOM behavior our sandboxes never saw.
          docker run --rm --cpus=2 -m 4g --memory-swap 4g \
            -e FIREWORKS_API_KEY -e FIREWORKS_BASE_URL -e ALLOWED_MODELS \
            -e LOCAL_CATEGORIES="sentiment,ner,summarization" \
            -e DIAG_ECHO=1 \
            -v "$PWD/tests/sandbox_tasks.json:/input/tasks.json:ro" \
            -v "$PWD/sbout:/output" \
            ghcr.io/jubayeronrob/vinci-monsoon:latest
          echo "=== RAW results.json (exactly what the judge reads) ==="
          cat sbout/results.json
          echo ""
          echo "=== integrity + correctness probes ==="
          python tests/sandbox_check.py tests/sandbox_tasks.json sbout/results.json
          echo "=== sandbox diag (route split under 4g/2cpu) ==="
          python -m json.tool sbout/diag.json
